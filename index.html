<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmers Branch Landscaping | Professional Landscape Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
      h1, h2, h3, h4, .font-heading { font-family: 'Playfair Display', serif; }
      body, p, span, a, button { font-family: 'Montserrat', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://link.gohighlevel.com/js/form_embed.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  

<!-- GHL Lead Form Modal -->
<div id="lp-modal" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)">
<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0" onclick="if(event.target===this)closeLp()">
<div style="background:#fff;width:100%;height:100%;position:relative;overflow:hidden">
<button onclick="closeLp()" style="position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:#f3f4f6;border:none;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
<iframe src="https://api.leadconnectorhq.com/widget/form/V9QMkt1feBt2gDK2gXPy" style="width:100%;height:100%;border:none;padding-top:8px" scrolling="yes" title="Get Free Estimate"></iframe>
</div></div></div>
<style>@media(min-width:641px){#lp-modal>div>div{width:480px;height:90vh;max-height:700px;border-radius:16px}}</style>
<script>
function openLp(){document.getElementById('lp-modal').style.display='block';document.body.style.overflow='hidden'}
function closeLp(){document.getElementById('lp-modal').style.display='none';document.body.style.overflow=''}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLp()});
document.addEventListener('click',function(e){var a=e.target.closest('a,button');if(!a)return;var h=a.getAttribute('href')||'';var t=a.textContent||'';if(h.includes('#contact')||h.includes('#quote')||t.match(/quote|estimate|consult|start.*project|request.*plan|book.*consult/i)){e.preventDefault();e.stopPropagation();openLp()}},true);
window.openModal=openLp;window.openLeadPopup=openLp;
</script>
</body>
</html>
